<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ffmpeg.js/0.10.1/ffmpeg.min.js"></script>
</head>
<body>
    <h1>Video Export</h1>
    <button id="exportBtn">Export MP4</button>
    <script>
        async function packageMp4(inputFile) {
            const ffmpeg = FFmpeg.createKernel();
            // Load the input WebM file
            await ffmpeg.load();
            ffmpeg.FS('writeFile', 'input.webm', await fetch(inputFile).then(res => res.blob()));

            // Convert WebM to MP4
            await ffmpeg.run('-i', 'input.webm', 'output.mp4');

            // Download the output file
            const data = ffmpeg.FS('readFile', 'output.mp4');

            const videoBlob = new Blob([data.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(videoBlob);
            const anchor = document.createElement('a');
            anchor.href = url;
            anchor.download = 'output.mp4';
            anchor.click();
        }

        document.getElementById('exportBtn').onclick = () => {
            // Call the packageMp4() function with the input file
            packageMp4('path/to/input.webm');
        };
    </script>
    <p>To export your video, upload a WebM file and click "Export MP4" to download the MP4 with audio included.</p>
</body>
</html>
